name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest # ships ruby, so the Psych oracle tests run rather than skip
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm lint:yaml-wrapper
      - run: pnpm build
      - run: pnpm budget
      # Build the installer site too, so a break in it fails a PR rather than
      # only surfacing at deploy time. Runs after budget, which needs the
      # library build's dist/bundle.js that this step then copies in.
      - run: pnpm build:installer
