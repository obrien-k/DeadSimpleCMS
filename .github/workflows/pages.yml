# Publishes the installer (installer/ → dist-site/) to this repo's GitHub Pages.
# Actions deploy, NOT deploy-from-branch: the installer is TypeScript that must
# be built, and a branch deploy would run the output through Jekyll. configure-
# pages sets the repo's Pages source to "GitHub Actions" on first run, so no
# manual branch/folder choice is needed.
name: Deploy installer to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      # enablement: true provisions the Pages site (source = GitHub Actions) on
      # the first run, so no manual Settings → Pages visit is needed. The
      # workflow token's pages: write permission (declared above) authorises it.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: pnpm install --frozen-lockfile
      # Order matters: the library build emits dist/bundle.js, which the
      # installer build copies in as an install payload.
      - run: pnpm build:site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
